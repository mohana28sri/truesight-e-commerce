services:
  - type: web
    name: truesight-e-commerce
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/database.sqlite
    disk:
      name: database
      mountPath: /data
      sizeGB: 1
